<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summit — Clock</title>
<script>
(function(){
  const saved = localStorage.getItem('summit_v3_theme');
  const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', theme);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg: #f7f7f6;
  --s1: #ffffff;
  --s2: #f2f2f0;
  --border: #e4e4e0;
  --border2: #d0d0cc;
  --tx: #1a1a18;
  --tx2: #5a5a56;
  --tx3: #9a9a94;
  --accent: #1a1a18;
  --accent-text: #ffffff;
  --accent-hover: #2d2d2a;
  --ontime: #2d6a4f;
  --ontime-bg: #edf7f2;
  --late: #b45309;
  --late-bg: #fef3e2;
  --vlate: #9b1c1c;
  --vlate-bg: #fde8e8;
  --absent: #374151;
  --absent-bg: #f3f4f6;
  --mout: #5b21b6;
  --mout-bg: #ede9fe;
  --radius: 6px;
  --radius-lg: 10px;
}
:root[data-theme="dark"] {
  --bg: #14141a;
  --s1: #1c1c22;
  --s2: #26262e;
  --border: #2e2e38;
  --border2: #3a3a46;
  --tx: #f0f0ee;
  --tx2: #b0b0b8;
  --tx3: #74747e;
  --accent: #f0f0ee;
  --accent-text: #14141a;
  --accent-hover: #d8d8d4;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--tx); font-family: 'Inter', sans-serif; font-size: 13px; min-height: 100vh; transition: background .15s, color .15s; }
/* ── HEADER ── */
.header {
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 24px;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.logo-mark { width: 26px; height: 26px; background: var(--accent); border-radius: 5px; display: flex; align-items: center; justify-content: center; }
.logo-mark svg { width: 14px; height: 14px; fill: var(--accent-text); }
.logo-name { font-size: 13px; font-weight: 600; letter-spacing: -0.2px; }
.logo-sub { font-size: 11px; color: var(--tx3); margin-left: 2px; }
.divider-v { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
.mf-divider-v { width: 1px; height: 16px; background: var(--border2); flex-shrink: 0; margin: 0 4px; }
/* Month filters */
.month-filters { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; }
.mf-btn {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
  color: var(--tx2);
  cursor: pointer;
  border: none;
  background: none;
  transition: all .12s;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.mf-btn:hover { background: var(--s2); color: var(--tx); }
.mf-btn.active { background: var(--accent); color: var(--accent-text); }
/* Header right */
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.theme-toggle {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  background: var(--s1); color: var(--tx2);
  cursor: pointer; transition: all .12s;
}
.theme-toggle:hover { border-color: var(--tx); color: var(--tx); }
.theme-toggle svg { width: 14px; height: 14px; }
.theme-toggle .icon-moon { display: block; }
.theme-toggle .icon-sun { display: none; }
[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
.upload-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 11px; font-weight: 500; color: var(--tx2);
  cursor: pointer; background: var(--s1);
  transition: all .12s;
  font-family: 'Inter', sans-serif;
}
.upload-btn:hover { border-color: var(--tx); color: var(--tx); }
.upload-btn input { display: none; }
/* ── CSV PREVIEW MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.3);
  z-index: 200; display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--s1); border-radius: var(--radius-lg);
  width: 560px; max-width: 95vw; max-height: 80vh;
  display: flex; flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,.18);
}
.modal-header {
  padding: 16px 20px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-title { font-size: 13px; font-weight: 600; }
.modal-close { font-size: 18px; color: var(--tx3); cursor: pointer; line-height: 1; background: none; border: none; padding: 0 4px; }
.modal-close:hover { color: var(--tx); }
.modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
.preview-label { font-size: 10px; font-weight: 600; color: var(--tx3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
.preview-emp-block { margin-bottom: 12px; }
.preview-emp-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.preview-badge { font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 10px; }
.preview-new { background: #dcfce7; color: #166534; }
.preview-dup { background: #f3f4f6; color: #9a9a94; }
.preview-rows { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--tx2); line-height: 1.8; }
.preview-row-new { color: #166534; }
.preview-row-dup { color: var(--tx3); }
.modal-footer {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-summary { font-size: 11px; color: var(--tx3); }
.btn-primary {
  padding: 6px 16px; background: var(--accent); color: var(--accent-text);
  border: none; border-radius: var(--radius); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: 'Inter', sans-serif;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary {
  padding: 6px 14px; background: var(--s1); color: var(--tx2);
  border: 1px solid var(--border2); border-radius: var(--radius); font-size: 12px;
  cursor: pointer; font-family: 'Inter', sans-serif;
}
.btn-secondary:hover { border-color: var(--tx); color: var(--tx); }
/* ── MAIN ── */
.main { padding: 20px 28px; }
/* ── PARAMS BAR ── */
.params-bar {
  display: flex; align-items: center; gap: 16px;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 10px 16px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.param-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--tx2); }
.param-label { color: var(--tx3); }
.param-input {
  width: 52px; padding: 3px 6px;
  border: 1px solid var(--border); border-radius: 4px;
  font-size: 11px; font-family: 'JetBrains Mono', monospace;
  color: var(--tx); background: var(--bg); outline: none;
}
.param-input:focus { border-color: var(--tx); }
.params-note { font-size: 10px; color: var(--tx3); margin-left: auto; }
/* ── EMPLOYEE TABLE ── */
.table-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.table-header-row {
  display: grid;
  grid-template-columns: 180px 1fr 1fr 1fr 1fr 1fr 90px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.th {
  font-size: 10px; font-weight: 600; color: var(--tx3);
  text-transform: uppercase; letter-spacing: .6px;
}
.emp-row-wrap { border-bottom: 1px solid var(--border); }
.emp-row-wrap:last-child { border-bottom: none; }
.emp-row {
  display: grid;
  grid-template-columns: 180px 1fr 1fr 1fr 1fr 1fr 90px;
  padding: 11px 16px;
  cursor: pointer;
  transition: background .1s;
  align-items: center;
}
.emp-row:hover { background: var(--bg); }
.emp-row.selected { background: var(--s2); }
.emp-name { font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 7px; }
.emp-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.emp-inactive .emp-name { color: var(--tx3); }
.cell { font-size: 12px; color: var(--tx2); font-family: 'JetBrains Mono', monospace; }
.cell-label { font-size: 11px; color: var(--tx2); }
/* STATUS PILL */
.pill {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 600; letter-spacing: .2px;
}
.pill-good { background: var(--ontime-bg); color: var(--ontime); }
.pill-warn { background: var(--late-bg); color: var(--late); }
.pill-bad  { background: var(--vlate-bg); color: var(--vlate); }
.pill-grey { background: var(--absent-bg); color: var(--absent); }
.pill-purple { background: var(--mout-bg); color: var(--mout); }
/* HOLIDAYS TABLE */
.holiday-header-row {
  display: grid;
  grid-template-columns: 110px 60px 1fr 100px;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.holiday-row {
  display: grid;
  grid-template-columns: 110px 60px 1fr 100px;
  padding: 10px 16px;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.holiday-row:last-child { border-bottom: none; }
/* DETAIL PANEL */
.detail-panel {
  background: var(--bg);
  border-top: 1px solid var(--border);
  padding: 16px;
  display: none;
}
.detail-panel.open { display: block; }
.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.detail-name { font-size: 12px; font-weight: 600; }
.detail-close {
  font-size: 11px; color: var(--tx3); cursor: pointer;
  padding: 2px 8px; border: 1px solid var(--border);
  border-radius: 4px; background: var(--s1);
  font-family: 'Inter', sans-serif;
}
.detail-close:hover { color: var(--tx); border-color: var(--tx); }
/* LOG TABLE */
.log-table { width: 100%; border-collapse: collapse; background: var(--s1); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.log-table thead th {
  text-align: left; padding: 7px 12px;
  font-size: 10px; font-weight: 600; color: var(--tx3);
  text-transform: uppercase; letter-spacing: .6px;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.log-table tbody tr { border-bottom: 1px solid var(--border); }
.log-table tbody tr:last-child { border-bottom: none; }
.log-table tbody tr:hover { background: var(--bg); }
.log-table tbody td { padding: 7px 12px; font-size: 11px; }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
/* STATUS BAR (mini) */
.status-bar { display: flex; gap: 2px; width: 100%; height: 5px; border-radius: 3px; overflow: hidden; }
.sb-seg { height: 100%; flex: 1; }
/* LEGEND */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
.leg-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--tx2); }
.leg-dot { width: 8px; height: 8px; border-radius: 2px; }
/* NOTIFICATION */
.notif {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--accent); color: var(--accent-text);
  padding: 9px 16px; border-radius: var(--radius);
  font-size: 12px; display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
}
/* MANAGE TOGGLE */
.inactive-toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--tx3); background: var(--bg);
}
.toggle-group { display: flex; gap: 8px; flex-wrap: wrap; }
.emp-toggle {
  display: flex; align-items: center; gap: 5px;
  padding: 3px 10px; border: 1px solid var(--border);
  border-radius: 20px; cursor: pointer; font-size: 11px;
  background: var(--s1); color: var(--tx2); transition: all .12s;
  font-family: 'Inter', sans-serif;
}
.emp-toggle.inactive-t { background: var(--bg); color: var(--tx3); text-decoration: line-through; }
.emp-toggle:hover { border-color: var(--tx); }
.emp-toggle .t-dot { width: 6px; height: 6px; border-radius: 50%; }
/* Empty state */
.empty { padding: 32px; text-align: center; color: var(--tx3); font-size: 12px; }
/* Attendance chart */
.chart-card-head { display: flex; align-items: baseline; justify-content: space-between; padding: 14px 16px 2px; gap: 12px; }
.chart-title { font-size: 12px; font-weight: 600; color: var(--tx); }
.chart-sub { font-size: 10px; color: var(--tx3); white-space: nowrap; }
.att-chart { padding: 10px 16px 18px; display: flex; flex-direction: column; gap: 9px; }
.att-bar-row { display: grid; grid-template-columns: 130px 1fr 44px; align-items: center; gap: 10px; }
.att-bar-name { font-size: 11px; color: var(--tx2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 6px; }
.att-bar-dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
.att-bar-track { background: var(--s2); border: 1px solid var(--border); border-radius: 999px; height: 15px; overflow: hidden; }
.att-bar-fill { height: 100%; border-radius: 999px; min-width: 3px; transition: width .4s ease; }
.att-bar-val { font-size: 11px; font-weight: 600; color: var(--tx); text-align: right; font-variant-numeric: tabular-nums; }
@media (max-width: 560px) { .att-bar-row { grid-template-columns: 92px 1fr 40px; } }
/* ── NAV TABS ── */
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  padding: 4px 14px; border-radius: 4px;
  font-size: 12px; font-weight: 500; color: var(--tx2);
  cursor: pointer; border: none; background: none;
  transition: all .12s; font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.nav-tab:hover { background: var(--s2); color: var(--tx); }
.nav-tab.active { background: var(--accent); color: var(--accent-text); }
/* ── ANNUAL CALENDAR ── */
.annual-cal-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 18px 18px; margin-bottom: 14px;
}
.annual-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.annual-nav-left { display: flex; align-items: center; gap: 8px; }
.annual-title { font-size: 13px; font-weight: 600; min-width: 38px; text-align: center; }
.annual-nav-btn {
  width: 22px; height: 22px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: var(--s1); color: var(--tx2);
  cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center;
  line-height: 1; transition: all .12s; font-family: 'Inter', sans-serif;
}
.annual-nav-btn:hover { border-color: var(--tx); color: var(--tx); }
.annual-legend { display: flex; align-items: center; gap: 12px; }
.annual-leg-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--tx2); }
.annual-leg-dot { width: 8px; height: 8px; border-radius: 2px; }
.annual-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.mini-cal {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 10px 12px;
}
.mini-cal-title { font-size: 10px; font-weight: 600; color: var(--tx); text-align: center; margin-bottom: 7px; letter-spacing: .1px; }
.mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
.mini-dow { font-size: 8px; font-weight: 600; color: var(--tx3); text-align: center; padding: 0 0 3px; }
.mini-day {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--tx2); border-radius: 3px;
}
.mini-day.today { background: var(--accent); color: var(--accent-text); font-weight: 700; }
.mini-day.holiday { background: var(--late-bg); color: var(--late); font-weight: 600; }
.mini-day.holiday.today { background: var(--late); color: #fff; }
.mini-day.other-month { visibility: hidden; }
.mini-day.weekend:not(.today):not(.holiday) { color: var(--tx3); }
/* Compact holidays table */
.holiday-table-compact .holiday-header-row,
.holiday-table-compact .holiday-row { padding: 6px 14px; }
.holiday-table-compact .holiday-row { font-size: 11px; }
.cal-section { display: none; }
.cal-section.active { display: block; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M8 2L2 5v6l6 3 6-3V5L8 2zm0 1.5L13 6v5L8 13.5 3 11V6l5-2.5z"/></svg>
    </div>
    <span class="logo-name">Summit</span>
    <span class="logo-sub">/ Clock</span>
  </div>
  <div class="divider-v"></div>
  <div class="nav-tabs">
    <button class="nav-tab active" id="tab-clock" onclick="switchTab('clock')">Clock</button>
    <button class="nav-tab" id="tab-calendar" onclick="switchTab('calendar')">Calendar</button>
  </div>
  <div class="divider-v" id="mf-divider"></div>
  <div class="month-filters" id="monthFilters"></div>
  <div class="header-right">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
      <svg class="icon-sun" viewBox="0 0 16 16" fill="currentColor"><path d="M8 4a4 4 0 100 8 4 4 0 000-8zM8 0a1 1 0 011 1v1a1 1 0 11-2 0V1a1 1 0 011-1zm0 13a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM16 8a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM3 8a1 1 0 01-1 1H1a1 1 0 110-2h1a1 1 0 011 1zm10.07-5.07a1 1 0 010 1.414l-.708.707a1 1 0 11-1.414-1.414l.707-.708a1 1 0 011.415 0zM4.05 11.95a1 1 0 010 1.414l-.707.707a1 1 0 11-1.415-1.414l.708-.708a1 1 0 011.414 0zm9.9 0a1 1 0 00-1.414 0l-.708.707a1 1 0 001.415 1.414l.707-.707a1 1 0 000-1.414zM4.05 4.05a1 1 0 00-1.414 0l-.708.708a1 1 0 001.414 1.414l.708-.707a1 1 0 000-1.415z"/></svg>
      <svg class="icon-moon" viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 0a7.5 7.5 0 109.79 9.79A7 7 0 016.5 0z"/></svg>
    </button>
    <label class="upload-btn" title="Upload EcoTime CSV">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L4 6h3v6h2V6h3L8 1zM2 13h12v2H2v-2z"/></svg>
      Upload CSV
      <input type="file" accept=".csv" onchange="previewCSV(event)">
    </label>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SECTION: CLOCK -->
  <div class="cal-section active" id="section-clock">

    <!-- PARAMS -->
    <div class="params-bar">
      <div class="param-item">
        <span class="param-label">Entry time</span>
        <input class="param-input" id="p_entry" value="07:00" oninput="renderAll()">
      </div>
      <div class="param-item">
        <span class="param-label">Tolerance</span>
        <input class="param-input" id="p_tol" value="15" oninput="renderAll()" style="width:42px"> min
      </div>
      <div class="param-item">
        <span class="param-label">Min hours/day</span>
        <input class="param-input" id="p_minhrs" value="8" oninput="renderAll()" style="width:42px"> h
      </div>
      <span class="params-note">IN after 12 PM → treated as OUT · Duplicate IN → earliest kept</span>
    </div>

    <!-- TABLE -->
    <div class="table-card">
      <div class="table-header-row">
        <div class="th">Employee</div>
        <div class="th">Attendance</div>
        <div class="th">On Time</div>
        <div class="th">Avg Arrival</div>
        <div class="th">Avg Hours</div>
        <div class="th">Absences</div>
        <div class="th">Missing OUT</div>
      </div>
      <div id="empTableBody"></div>
      <div class="inactive-toggle-row" id="toggleRow" style="display:none;">
        <button class="btn-secondary" id="toggleRowBtn" onclick="toggleShowInactive()" style="font-size:11px;padding:3px 10px;">Show inactive</button>
        <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--tx3);">
          Per-employee:
          <div class="toggle-group" id="toggleGroup"></div>
        </div>
      </div>
    </div>

    <!-- ATTENDANCE CHART -->
    <div class="table-card" style="margin-top:16px;">
      <div class="chart-card-head">
        <div class="chart-title">香蕉炒饭</div>
        <div class="chart-sub" id="attChartSub"></div>
      </div>
      <div id="attChart" class="att-chart"></div>
    </div>

  </div><!-- /section-clock -->

  <!-- SECTION: CALENDAR -->
  <div class="cal-section" id="section-calendar">

// ── PARAMS ────────────────────────────────────────────────
function getParams() {
  const entryStr = document.getElementById('p_entry').value || '07:00';
  const [eh, em] = entryStr.split(':').map(Number);
  const entryMin = (eh||7)*60 + (em||0);
  const tol = parseInt(document.getElementById('p_tol').value)||15;
  const minHrs = parseFloat(document.getElementById('p_minhrs').value)||8;
  return { entryMin, tol, minHrs, lateMin: entryMin+tol, vLateMin: entryMin+60 };
}

// ── TIME HELPERS ──────────────────────────────────────────
function parseMin(t) {
  if (!t) return null;
  const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!m) return null;
  let h=+m[1], mn=+m[2], per=m[3].toUpperCase();
  if (per==='PM'&&h!==12) h+=12;
  if (per==='AM'&&h===12) h=0;
  return h*60+mn;
}
function minToStr(m) {
  if (m===null||m===undefined) return '—';
  const rounded = Math.round(m);
  const h=Math.floor(rounded/60), mn=rounded%60;
  const per=h>=12?'PM':'AM', hh=h%12||(12);
  return `${hh}:${String(mn).padStart(2,'0')} ${per}`;
}

// ── DATA CLEANING ─────────────────────────────────────────
// Per (employee, date): handle multiple records, PM-as-OUT rule, etc.
function cleanRecord(r) {
  const tiMin = parseMin(r.time_in);
  const toMin = parseMin(r.time_out);
  // If IN is after 12 PM (720 min) → treat as OUT, no real arrival
  const inIsOUT = tiMin !== null && tiMin >= 720;
  const cleanIn = inIsOUT ? '' : r.time_in;
  const cleanInMin = inIsOUT ? null : tiMin;
  // missing_out: has in, no out, and work_hours ~0
  const mout = !inIsOUT && r.time_in !== '' && (r.time_out === '' || toMin === null) && r.work_hours < 0.1;
  return { ...r, time_in: cleanIn, time_in_min: cleanInMin, time_out: r.time_out, work_hours: r.work_hours, missing_out: mout };
}

// Group by employee+date, merge duplicates (earliest IN, latest OUT)
function mergeDay(recs) {
  if (recs.length === 1) return cleanRecord(recs[0]);
  const cleaned = recs.map(cleanRecord);
  const withIn = cleaned.filter(r => r.time_in_min !== null);
  const withOut = cleaned.filter(r => r.time_out !== '');
  const bestIn = withIn.length ? withIn.reduce((a,b) => a.time_in_min < b.time_in_min ? a : b) : null;
  const bestOut = withOut.length ? withOut.reduce((a,b) => {
    const am = parseMin(a.time_out), bm = parseMin(b.time_out);
    return (am||0) > (bm||0) ? a : b;
  }) : null;
  const base = cleaned[0];
  const ti = bestIn ? bestIn.time_in : '';
  const to = bestOut ? bestOut.time_out : '';
  const wh = Math.max(...cleaned.map(r=>r.work_hours));
  const mout = ti !== '' && (to === '' || parseMin(to) === null) && wh < 0.1;
  return { ...base, time_in: ti, time_in_min: bestIn?.time_in_min ?? null, time_out: to, work_hours: wh, missing_out: mout };
}

// Build clean day map: { employee: { date: cleanedRecord } }
let CLEAN = {};
function buildClean() {
  CLEAN = {};
  const grouped = {};
  for (const r of RAW) {
    if (!grouped[r.employee]) grouped[r.employee] = {};
    if (!grouped[r.employee][r.date]) grouped[r.employee][r.date] = [];
    grouped[r.employee][r.date].push(r);
  }
  for (const [emp, days] of Object.entries(grouped)) {
    CLEAN[emp] = {};
    for (const [date, recs] of Object.entries(days)) {
      CLEAN[emp][date] = mergeDay(recs);
    }
  }
}

// ── FILTER ────────────────────────────────────────────────
const MONTH_NAMES = {
  '2025-06':'Jun','2025-07':'Jul','2025-08':'Aug','2025-09':'Sep',
  '2025-10':'Oct','2025-11':'Nov','2025-12':'Dec','2026-01':'Jan'
};
function getMonths() {
  const s = new Set(RAW.map(r=>r.date.slice(0,7)));
  return [...s].sort();
}
function filterRecords(emp) {
  const days = Object.values(CLEAN[emp]||{});
  if (selectedMonth==='ytd') {
    const now = new Date();
    const cutoff = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    return days.filter(r => r.date.slice(0,7) <= cutoff && r.date.startsWith(String(now.getFullYear())));
  }
  if (selectedMonth==='all') return days;
  // year-only (e.g. '2025') — full year
  if (/^\d{4}$/.test(selectedMonth)) return days.filter(r => r.date.startsWith(selectedMonth));
  // month (e.g. '2025-08')
  return days.filter(r => r.date.startsWith(selectedMonth));
}

// ── STATS ─────────────────────────────────────────────────
function calcStats(days) {
  const p = getParams();
  const workdays = days.filter(r=>!HOLIDAYS.has(r.date) && !r._isHoliday);
  const total = workdays.length;
  const present = workdays.filter(r => r.time_in !== '').length;
  const absent  = workdays.filter(r => r.time_in === '' && !r.missing_out).length;
  const mout    = workdays.filter(r => r.missing_out).length;
  const hours   = workdays.reduce((s,r)=>s+r.work_hours,0);
  // Arrivals — only non-null, non-PM
  const arrivals = workdays.filter(r=>r.time_in_min!==null&&r.time_in_min<720);
  const ontime  = arrivals.filter(r=>r.time_in_min<=p.lateMin).length;
  const late    = arrivals.filter(r=>r.time_in_min>p.lateMin&&r.time_in_min<=p.vLateMin).length;
  const vlate   = arrivals.filter(r=>r.time_in_min>p.vLateMin).length;
  const avgArr  = arrivals.length ? arrivals.reduce((s,r)=>s+r.time_in_min,0)/arrivals.length : null;
  const avgHrs  = present>0 ? hours/present : 0;
  const attPct  = total>0 ? (present/total*100) : 0;
  const ontimePct = arrivals.length>0 ? (ontime/arrivals.length*100) : 0;
  return {total,present,absent,mout,hours,arrivals:arrivals.length,ontime,late,vlate,avgArr,avgHrs,attPct,ontimePct};
}

function dayStatus(r) {
  const p = getParams();
  if (r._isHoliday || HOLIDAYS.has(r.date)) return 'holiday';
  if (r.time_in==='') return r.missing_out ? 'mout' : 'absent';
  if (r.missing_out) return 'mout';
  if (r.time_in_min===null) return 'present';
  if (r.time_in_min <= p.lateMin) return 'ontime';
  if (r.time_in_min <= p.vLateMin) return 'late';
  return 'vlate';
}

function init() {
  buildClean();
  const saved = localStorage.getItem('summit_v3_active');
  const all = [...new Set(RAW.map(r=>r.employee))].sort();
  if (saved) activeStatus = JSON.parse(saved);
  else all.forEach(e => activeStatus[e] = !DEFAULT_INACTIVE.has(e));
  buildMonthFilters();
  renderAll();
}

function saveActive() { localStorage.setItem('summit_v3_active', JSON.stringify(activeStatus)); }

// ── MONTH FILTERS ─────────────────────────────────────────
function buildMonthFilters() {
  renderMonthFilters();
}

function getAvailableYears() {
  const months = getMonths(); // e.g. ['2025-06','2025-07',...]
  return [...new Set(months.map(m => m.slice(0,4)))].sort().reverse();
}

function renderMonthFilters() {
  const container = document.getElementById('monthFilters');
  const years = getAvailableYears();
  const now = new Date();
  const currentYear = String(now.getFullYear());

  // Determine active year group
  let activeYear = null;
  if (selectedMonth !== 'ytd' && selectedMonth !== 'all') {
    activeYear = selectedMonth.slice(0,4);
  } else if (selectedMonth === 'ytd') {
    activeYear = 'ytd';
  }

  // Row 1: ALL · YTD · 2026 · 2025 ...
  let row1 = `<button class="mf-btn ${selectedMonth==='all'?'active':''}" onclick="selectYear('all')">All</button>`;
  row1 += `<button class="mf-btn ${activeYear==='ytd'?'active':''}" onclick="selectYear('ytd')">YTD</button>`;
  years.forEach(y => {
    const isActive = activeYear === y && selectedMonth !== 'ytd';
    row1 += `<button class="mf-btn ${isActive?'active':''}" onclick="selectYear('${y}')">${y}</button>`;
  });

  // Row 2: months of selected year (only if a specific year is selected)
  let row2 = '';
  if (activeYear && activeYear !== 'ytd' && selectedMonth !== 'all') {
    const yearMonths = getMonths().filter(m => m.startsWith(activeYear));
    const SHORT = {
      '01':'Jan','02':'Feb','03':'Mar','04':'Apr','05':'May','06':'Jun',
      '07':'Jul','08':'Aug','09':'Sep','10':'Oct','11':'Nov','12':'Dec'
    };
    // Always show months row when a year is selected
    const allYearActive = selectedMonth === activeYear;
    row2 += `<button class="mf-btn ${allYearActive?'active':''}" style="opacity:.7" onclick="selectMonth('${activeYear}')">All</button>`;
    yearMonths.forEach(m => {
      const mo = m.slice(5,7);
      const isActive = selectedMonth === m;
      row2 += `<button class="mf-btn ${isActive?'active':''}" onclick="selectMonth('${m}')">${SHORT[mo]}</button>`;
    });
  }

  container.innerHTML = `
    <div style="display:flex;gap:2px;align-items:center;">${row1}</div>
    ${row2 ? `<div class="mf-divider-v"></div><div style="display:flex;gap:2px;align-items:center;">${row2}</div>` : ''}
  `;
}

function selectYear(y) {
  if (y === 'all') {
    selectedMonth = 'all';
  } else if (y === 'ytd') {
    selectedMonth = 'ytd';
  } else {
    // Default to "All [year]" so month row appears and user can pick
    selectedMonth = y;
  }
  renderMonthFilters();
  renderAll();
}

function selectMonth(m) {
  selectedMonth = m;
  renderMonthFilters();
  renderAll();
}

function setMonth(m, el) {
  // Legacy — keep for compatibility
  selectedMonth = m;
  renderMonthFilters();
  renderAll();
}


// ── PERIOD LABEL ──────────────────────────────────────────
function periodLabel() {
  const now = new Date();
  if (selectedMonth==='ytd') return `YTD ${now.getFullYear()}`;
  if (selectedMonth==='all') return 'All time';
  if (/^\d{4}$/.test(selectedMonth)) return selectedMonth;
  return MONTH_NAMES[selectedMonth]||selectedMonth;
}

// ── ANNUAL CALENDAR ────────────────────────────────────────
let calYear = new Date().getFullYear();
const CAL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function calMove(dir) {
  calYear += dir;
  renderCalendar();
}

function renderCalendar() {
  const titleEl = document.getElementById('calYearTitle');
  const grid    = document.getElementById('annualGrid');
  if (!titleEl || !grid) return;

  titleEl.textContent = calYear;
  const todayStr = new Date().toISOString().slice(0,10);
  let html = '';

  for (let m = 0; m < 12; m++) {
    const firstDay    = new Date(calYear, m, 1).getDay();
    const daysInMonth = new Date(calYear, m + 1, 0).getDate();
    const mm = String(m + 1).padStart(2,'0');

    let mHtml = `<div class="mini-cal"><div class="mini-cal-title">${CAL_MONTHS[m]}</div><div class="mini-cal-grid">`;
    mHtml += 'SMTWTFS'.split('').map(c=>`<div class="mini-dow">${c}</div>`).join('');

    for (let i = 0; i < firstDay; i++) mHtml += `<div class="mini-day other-month"></div>`;

    for (let d = 1; d <= daysInMonth; d++) {
      const dd      = String(d).padStart(2,'0');
      const dateStr = `${calYear}-${mm}-${dd}`;
      const dow     = new Date(dateStr + 'T00:00:00').getDay();
      const isToday   = dateStr === todayStr;
      const isHoliday = HOLIDAYS.has(dateStr);
      const isWeekend = dow === 0 || dow === 6;
      let cls = 'mini-day';
      if (isToday)        cls += ' today';
      else if (isHoliday) cls += ' holiday';
      else if (isWeekend) cls += ' weekend';
      const tip = isHoliday ? ` title="${HOLIDAY_NAMES[dateStr]||'NYSE Holiday'}"` : '';
      mHtml += `<div class="${cls}"${tip}>${d}</div>`;
    }

    const trailing = (7 - ((firstDay + daysInMonth) % 7)) % 7;
    for (let i = 0; i < trailing; i++) mHtml += `<div class="mini-day other-month"></div>`;

    mHtml += `</div></div>`;
    html += mHtml;
  }

  grid.innerHTML = html;
}

// ── ATTENDANCE CHART ───────────────────────────────────────
function renderAttendanceChart() {
  const el = document.getElementById('attChart');
  if (!el) return;
  const all = [...new Set(RAW.map(r=>r.employee))].sort();
  const list = showInactive ? all : all.filter(e=>activeStatus[e]);
  const rows = list.map(e=>{
    const days = filterRecords(e);
    const s = days.length ? calcStats(days) : null;
    return { e, pct: s ? s.attPct : null, col: COLORS[e]||'#888', inactive: !activeStatus[e] };
  }).filter(r => r.pct !== null)
    .sort((a,b)=> b.pct - a.pct);

  const sub = document.getElementById('attChartSub');
  if (sub) {
    sub.textContent = rows.length
      ? `${rows.length} employees · avg ${(rows.reduce((s,r)=>s+r.pct,0)/rows.length).toFixed(0)}%`
      : '';
  }

  el.innerHTML = rows.length ? rows.map(r=>`
    <div class="att-bar-row"${r.inactive?' style="opacity:.5"':''} title="${r.e}: ${r.pct.toFixed(0)}% attendance">
      <div class="att-bar-name"><div class="att-bar-dot" style="background:${r.col}"></div>${r.e}</div>
      <div class="att-bar-track"><div class="att-bar-fill" style="width:${Math.max(0,Math.min(100,r.pct)).toFixed(0)}%;background:${r.col}"></div></div>
      <div class="att-bar-val">${r.pct.toFixed(0)}%</div>
    </div>`).join('') : '<div class="empty">No data for this period.</div>';
}

// ── NYSE HOLIDAYS TABLE ─────────────────────────────────────
function renderHolidaysTable() {
  const body = document.getElementById('holidaysTableBody');
  if (!body) return;

  const years = new Set(getAvailableYears());
  const todayStr = new Date().toISOString().slice(0,10);
  const dates = [...HOLIDAYS].filter(d => years.has(d.slice(0,4))).sort();

  body.innerHTML = dates.map(d => {
    const dow = new Date(d + 'T00:00:00').getDay();
    const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dow];
    const name = HOLIDAY_NAMES[d] || 'NYSE Holiday';
    let statusPill;
    if (d < todayStr) statusPill = `<span class="pill pill-grey">Past</span>`;
    else if (d === todayStr) statusPill = `<span class="pill pill-warn">Today</span>`;
    else statusPill = `<span class="pill pill-good">Upcoming</span>`;
    return `<div class="holiday-row">
      <div class="mono">${d}</div>
      <div class="cell-label">${dayName}</div>
      <div class="cell-label">${name}</div>
      <div>${statusPill}</div>
    </div>`;
  }).join('');
}

// ── EMPLOYEE TABLE ─────────────────────────────────────────
let showInactive = false;

function renderTable() {
  const all = [...new Set(RAW.map(r=>r.employee))].sort();
  const active = all.filter(e=>activeStatus[e]);
  const inactive = all.filter(e=>!activeStatus[e]);
  const body = document.getElementById('empTableBody');
  let html = '';

  // Active employees always shown
  active.forEach(e=>{
    const days = filterRecords(e);
    const s = days.length ? calcStats(days) : null;
    const col = COLORS[e]||'#888';
    const isSelected = selectedEmp===e;
    html += `<div class="emp-row-wrap" id="wrap_${e.replace(/ /g,'_')}">
      <div class="emp-row ${isSelected?'selected':''}" onclick="toggleDetail('${e}')">
        <div class="emp-name"><div class="emp-dot" style="background:${col}"></div>${e}</div>
        <div class="cell">${s ? s.attPct.toFixed(0)+'%' : '<span style="color:var(--tx3)">—</span>'}</div>
        <div class="cell">${s && s.arrivals>0 ? s.ontimePct.toFixed(0)+'%' : '—'}</div>
        <div class="cell">${s ? minToStr(s.avgArr) : '—'}</div>
        <div class="cell">${s && s.avgHrs>0 ? s.avgHrs.toFixed(1)+'h' : '—'}</div>
        <div>${s && s.absent>0 ? `<span class="pill pill-grey">${s.absent}d</span>` : (s?'<span style="color:var(--tx3);font-size:11px;">0</span>':'—')}</div>
        <div>${s && s.mout>0 ? `<span class="pill pill-purple">${s.mout}</span>` : (s?'<span style="color:var(--tx3);font-size:11px;">0</span>':'—')}</div>
      </div>
      <div class="detail-panel ${isSelected?'open':''}" id="detail_${e.replace(/ /g,'_')}"></div>
    </div>`;
  });

  // Inactive employees: shown only if showInactive=true
  if (inactive.length > 0) {
    if (showInactive) {
      inactive.forEach(e=>{
        const days = filterRecords(e);
        const s = days.length ? calcStats(days) : null;
        const col = COLORS[e]||'#888';
        html += `<div class="emp-row-wrap" id="wrap_${e.replace(/ /g,'_')}" style="opacity:.45;">
          <div class="emp-row emp-inactive" onclick="toggleDetail('${e}')">
            <div class="emp-name"><div class="emp-dot" style="background:${col}"></div>${e} <span style="font-size:10px;color:var(--tx3);font-weight:400;">inactive</span></div>
            <div class="cell">${s ? s.attPct.toFixed(0)+'%' : '—'}</div>
            <div class="cell">${s && s.arrivals>0 ? s.ontimePct.toFixed(0)+'%' : '—'}</div>
            <div class="cell">${s ? minToStr(s.avgArr) : '—'}</div>
            <div class="cell">${s && s.avgHrs>0 ? s.avgHrs.toFixed(1)+'h' : '—'}</div>
            <div>${s && s.absent>0 ? `<span class="pill pill-grey">${s.absent}d</span>` : (s?'<span style="color:var(--tx3);font-size:11px;">0</span>':'—')}</div>
            <div>${s && s.mout>0 ? `<span class="pill pill-purple">${s.mout}</span>` : (s?'<span style="color:var(--tx3);font-size:11px;">0</span>':'—')}</div>
          </div>
          <div class="detail-panel ${selectedEmp===e?'open':''}" id="detail_${e.replace(/ /g,'_')}"></div>
        </div>`;
      });
    }
  }

  body.innerHTML = html || '<div class="empty">No data for this period.</div>';

  // Toggle row at bottom
  const toggleRow = document.getElementById('toggleRow');
  if (inactive.length > 0) {
    toggleRow.style.display = 'flex';
    document.getElementById('toggleRowBtn').textContent = showInactive
      ? `Hide inactive (${inactive.length})`
      : `Show inactive (${inactive.length})`;
  } else {
    toggleRow.style.display = 'none';
  }

  // Per-employee hide/show buttons
  document.getElementById('toggleGroup').innerHTML = all.map(e=>`
    <button class="emp-toggle ${!activeStatus[e]?'inactive-t':''}" onclick="toggleEmp('${e}')">
      <div class="t-dot" style="background:${COLORS[e]||'#888'}"></div>${e.split(' ')[0]}
    </button>`).join('');

  if (selectedEmp) renderDetail(selectedEmp);
}

function toggleEmp(name) {
  activeStatus[name] = !activeStatus[name];
  if (!activeStatus[name] && selectedEmp===name) selectedEmp=null;
  saveActive();
  renderAll();
  notify(`${name.split(' ')[0]} ${activeStatus[name]?'active':'hidden'}`);
}

function toggleShowInactive() {
  showInactive = !showInactive;
  renderTable();
  renderAttendanceChart();
}

// ── DETAIL PANEL ──────────────────────────────────────────
function toggleDetail(emp) {
  if (selectedEmp===emp) {
    selectedEmp = null;
    renderTable();
    return;
  }
  selectedEmp = emp;
  renderTable();
}

function renderDetail(emp) {
  const id = `detail_${emp.replace(/ /g,'_')}`;
  const panel = document.getElementById(id);
  if (!panel) return;
  const rawDays = filterRecords(emp);
  // Also inject NYSE holiday rows that have no record (employee wasn't tracked that day)
  const rawDates = new Set(rawDays.map(r=>r.date));
  if (rawDays.length > 0) {
    const minDate = rawDays.reduce((a,b)=>a.date<b.date?a:b).date;
    const maxDate = rawDays.reduce((a,b)=>a.date>b.date?a:b).date;
    HOLIDAYS.forEach(hd=>{
      if (hd >= minDate && hd <= maxDate && !rawDates.has(hd)) {
        // Only add if it's a weekday
        const dow = new Date(hd).getDay();
        if (dow>0 && dow<6) {
          rawDays.push({employee:emp,date:hd,day:['SUN','MON','TUE','WED','THU','FRI','SAT'][dow],time_in:'',time_out:'',work_hours:0,missing_in:false,missing_out:false,_isHoliday:true});
        }
      }
    });
  }
  const days = rawDays.sort((a,b)=>b.date.localeCompare(a.date));
  const p = getParams();

  const rows = days.map(r=>{
    const st = dayStatus(r);
    const pill = {
      ontime:`<span class="pill pill-good">On time</span>`,
      late:`<span class="pill pill-warn">Late</span>`,
      vlate:`<span class="pill pill-bad">Very late</span>`,
      absent:`<span class="pill pill-grey">Absent</span>`,
      mout:`<span class="pill pill-purple">Missing OUT</span>`,
      holiday:`<span class="pill" style="background:#f3f4f6;color:#6b7280;">${HOLIDAY_NAMES[r.date]||'NYSE Holiday'}</span>`,
      present:`<span class="pill pill-good">Present</span>`,
    }[st]||'';
    const tiStr = r.time_in || '—';
    const toStr = r.time_out || '—';
    const hrsStr = r.work_hours>0.05 ? r.work_hours.toFixed(1)+'h' : '—';
    // Late by
    let lateBy = '';
    if (r.time_in_min!==null && r.time_in_min>p.lateMin && r.time_in_min<720) {
      const diff = r.time_in_min - p.entryMin;
      lateBy = `<span style="color:${diff>60?'var(--vlate)':'var(--late)'};font-size:10px;">+${diff}min</span>`;
    }
    return `<tr>
      <td class="mono">${r.date}</td>
      <td style="color:var(--tx3);font-size:10px;">${r.day}</td>
      <td class="mono">${tiStr} ${lateBy}</td>
      <td class="mono">${toStr}</td>
      <td class="mono">${hrsStr}</td>
      <td>${pill}</td>
    </tr>`;
  }).join('');

  // Summary pills for this period
  const s = calcStats(days);
  panel.innerHTML = `
    <div class="detail-header">
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:8px;height:8px;border-radius:50%;background:${COLORS[emp]||'#888'};"></div>
        <span class="detail-name">${emp}</span>
        <span style="font-size:10px;color:var(--tx3);">${s.present} days present · ${s.absent} absent · ${s.mout} missing OUT · avg ${minToStr(s.avgArr)} · ${s.avgHrs.toFixed(1)}h/day</span>
      </div>
      <button class="detail-close" onclick="toggleDetail('${emp}')">Close</button>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--ontime-bg);border:1px solid var(--ontime);"></div>On time</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--late-bg);border:1px solid var(--late);"></div>Late (&lt;1h)</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--vlate-bg);border:1px solid var(--vlate);"></div>Very late (&gt;1h)</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--absent-bg);border:1px solid #9ca3af;"></div>Absent</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--mout-bg);border:1px solid var(--mout);"></div>Missing OUT</div>
    </div>
    <table class="log-table">
      <thead><tr><th>Date</th><th>Day</th><th>IN</th><th>OUT</th><th>Hours</th><th>Status</th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--tx3);padding:20px;">No records for this period.</td></tr>'}</tbody>
    </table>`;
}

// ── CSV UPLOAD & PREVIEW ────────────────────────────────────
let pendingCSVRecords = [];
let pendingCSVFile = '';

function parseCSVRecords(text) {
  // Returns [{employee, date, day, time_in, time_out, work_hours, missing_out, isNew}]
  const existing = new Set(RAW.map(r=>`${r.employee}|${r.date}`));
  const parsed = []; let cur = null;
  for (const line of text.split('\n')) {
    const parts = line.split(',').map(s=>s.trim());
    if (parts[0]==='Employee') {
      const m=(parts[3]||'').match(/(.+)\s+\(\d+\)/);
      if(m) cur=m[1].trim();
    } else if (['MON','TUE','WED','THU','FRI'].includes(parts[0])&&cur) {
      try {
        const [mo,dy,yr]=parts[1].split('/');
        if (!yr) continue;
        const ds=`${yr}-${mo.padStart(2,'0')}-${dy.padStart(2,'0')}`;
        const key=`${cur}|${ds}`;
        const ti=parts[2]||'', to=parts[3]||'', note=parts[6]||'';
        let wh=0; try{wh=parseFloat(parts[4])||0;}catch(e){}
        const mout=note.includes('Missing OUT')||(ti!==''&&to===''&&wh<0.1);
        parsed.push({employee:cur,date:ds,day:parts[0],time_in:ti,time_out:to,work_hours:wh,missing_in:false,missing_out:mout,isNew:!existing.has(key)});
      } catch(ex){}
    }
  }
  return parsed;
}

function previewCSV(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    const records = parseCSVRecords(e.target.result);
    pendingCSVRecords = records;
    pendingCSVFile = file.name;
    showPreviewModal(records, file.name);
  };
  reader.readAsText(file);
}

function showPreviewModal(records, filename) {
  const newRecs = records.filter(r=>r.isNew);
  const dupRecs = records.filter(r=>!r.isNew);
  // Group by employee
  const byEmp = {};
  records.forEach(r=>{
    if (!byEmp[r.employee]) byEmp[r.employee]=[];
    byEmp[r.employee].push(r);
  });
  // Get period from records
  const dates = records.map(r=>r.date).sort();
  const period = dates.length ? `${dates[0]} → ${dates[dates.length-1]}` : '';
  document.getElementById('modalTitle').textContent = `Preview · ${filename}`;
  let body = `<div class="preview-label">Period: ${period}</div>`;
  Object.entries(byEmp).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([emp, recs])=>{
    const empNew = recs.filter(r=>r.isNew);
    const empDup = recs.filter(r=>!r.isNew);
    const col = COLORS[emp]||'#888';
    body += `<div class="preview-emp-block">
      <div class="preview-emp-name">
        <div style="width:7px;height:7px;border-radius:50%;background:${col};flex-shrink:0;"></div>
        ${emp}
        ${empNew.length ? `<span class="preview-badge preview-new">+${empNew.length} new</span>` : ''}
        ${empDup.length ? `<span class="preview-badge preview-dup">${empDup.length} already exist</span>` : ''}
      </div>
      <div class="preview-rows">`;
    // Show up to 6 new records, then summarize
    const toShow = empNew.slice(0,6);
    toShow.forEach(r=>{
      const ti = r.time_in||'—', to=r.time_out||'—';
      const wh = r.work_hours>0.05?r.work_hours.toFixed(1)+'h':'—';
      const flag = r.missing_out?' ⚠ missing OUT':'';
      body += `<div class="preview-row-new">+ ${r.date} ${r.day}  IN:${ti}  OUT:${to}  ${wh}${flag}</div>`;
    });
    if (empNew.length > 6) body += `<div style="color:var(--tx3);font-size:10px;">  … and ${empNew.length-6} more new records</div>`;
    if (empDup.length > 0) body += `<div style="color:var(--tx3);font-size:10px;">(${empDup.length} duplicate records will be skipped)</div>`;
    body += `</div></div>`;
  });
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalSummary').textContent = `${newRecs.length} new records · ${dupRecs.length} duplicates skipped`;
  document.getElementById('csvModal').classList.add('open');
}

function closeModal() {
  document.getElementById('csvModal').classList.remove('open');
  pendingCSVRecords = [];
}

function confirmUpload() {
  const existing = new Set(RAW.map(r=>`${r.employee}|${r.date}`));
  let added = 0;
  pendingCSVRecords.filter(r=>r.isNew).forEach(r=>{
    const key=`${r.employee}|${r.date}`;
    if (existing.has(key)) return;
    const {isNew,...rec}=r;
    RAW.push(rec);
    if (!activeStatus.hasOwnProperty(r.employee)) activeStatus[r.employee]=true;
    existing.add(key); added++;
  });
  closeModal();
  buildClean();
  buildMonthFilters();
  renderAll();
  notify(`Imported ${added} records from ${pendingCSVFile}`);
}

// ── NOTIFY ────────────────────────────────────────────────
function notify(msg) {
  const el=document.getElementById('notif');
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}

// ── THEME ─────────────────────────────────────────────────
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('summit_v3_theme', next);
}

init();
</script>
